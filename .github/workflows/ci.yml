name: CI

on:
    push:
        tags: [ "*.*.*" ]

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            -   uses: actions/checkout@v7

            -   uses: oven-sh/setup-bun@v2

            -   run: bun install

            -   run: tsc --noEmit

            -   run: bun test

            -   uses: actions/setup-node@v6
                with:
                    node-version: '24'
                    registry-url: 'https://registry.npmjs.org'

            -   run: npm publish --access public