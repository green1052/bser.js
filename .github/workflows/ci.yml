name: CI

on:
    push:
        tags: [ "*.*.*" ]

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            -   uses: actions/checkout@v7

            -   uses: oven-sh/setup-bun@v2

            -   run: bun install

            -   run: tsc --noEmit

            -   run: bun test

            -   run: |
                    echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
                    npm publish --access public
                env:
                    NODE_AUTH_TOKEN: ${{ secrets.NPM_CONFIG_TOKEN }}